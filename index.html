    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: flex-start; background: #f4f7f6; margin: 0; padding: 20px; cursor: none; }
        .toolbar { background: #f7f8fa; padding: 10px 14px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; align-items: center; border: 1px solid #ddd; cursor: default; width: 100%; box-sizing: border-box; }
        .group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .group.group-sep { padding-bottom: 0; margin-bottom: 0; }
        .text-tool-section { width: auto; padding-left: 8px; padding-top: 4px; padding-right: 8px; padding-bottom: 4px; margin: 0; background: #f8f9fa; border-radius: 4px; box-sizing: border-box; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
        .text-tool-section label, .text-tool-section select { font-size: 10px; }
        .toolbar .toolbar-btn { min-width: 0; box-sizing: border-box; }
        
        #canvas-container { 
            position: relative; width: 708px; height: 681px; border: 2px solid #333; background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow: visible;
        }
        canvas { position: absolute; top: 0; left: 0; width: 708px; height: 681px; }
        
        #custom-cursor {
            position: fixed; width: 30px; height: 30px; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transform: translate(-50%, -50%);
        }
        #custom-cursor::before, #custom-cursor::after { content: ''; position: absolute; background: white; }
        #custom-cursor::before { top: 14px; left: 0; width: 30px; height: 2px; }
        #custom-cursor::after { left: 14px; top: 0; width: 2px; height: 30px; }

        button { padding: 10px 15px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        button:hover { background: #f9f9f9; }
        button.active { background: #007bff; color: white; border-color: #0056b3; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 4px rgba(0,0,0,0.2); }

        .download-btn { background: #28a745 !important; color: white !important; font-weight: 600; border: none !important; padding: 8px 18px !important; font-size: 13px !important; }

        #multi-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.4); z-index: 1000; cursor: default;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; }
        .hint-bar {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
            width: 100%;
            max-width: 1596px;
            box-sizing: border-box;
            text-align: center;
        }
        .name-input {
            padding: 6px 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            min-width: 180px;
            box-sizing: border-box;
        }
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            cursor: default;
            box-sizing: border-box;
        }
        .title-left {
            margin: 0;
        }
        .title-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 12px;
            color: #666;
            cursor: default;
        }
        .user-bar button {
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .usage-badge {
            font-size: 12px;
            color: #333;
            background: #e8f5e9;
            border-radius: 6px;
            padding: 4px 10px;
        }
        .header-toolbar-wrap {
            width: 100%;
            max-width: 1680px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .header-content-block {
            width: 1596px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
        }
        .toolbar-canvas-row {
            display: contents;
        }
        .main-content {
            display: grid;
            grid-template-columns: 708px 708px;
            column-gap: 15px;
            align-items: flex-start;
        }
        .map-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;

        }
        #map-canvas-container {
            position: relative;
            width: 708px;
            height: 681px;
            border: 2px solid #333;
            background: #e8e8e8;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: visible;
        }
        #map-canvas-container canvas {
            position: absolute;
            top: 0;
            left: 0;

        }
        .map-address-row {
            display: flex;

        .map-address-row input {

        }
        .map-address-row input.api-key {
            min-width: 120px;
            font-size: 12px;
        }
        .map-address-row label {
            font-size: 12px;
            color: #666;
        }
        .canvas-scale-wrap {
            transform-origin: top left;
            transform: scale(0.8);
            margin: 0;
            width: 1596px;
            max-width: 100%;

        .app-card {
            display: flex;

            border: 1px solid #e0e0e0;
            box-sizing: border-box;
        }
    </style>

    <script>
        const TEMPLATE_URL = 'https://nozutax.github.io/PDF-Export-with-Shapes/shozaizu-haichizu.pdf';
        const { PDFDocument } = PDFLib;

        let supabase = null;
        let currentSession = null;

        function getMonthKey(d) {
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            return `${yyyy}-${mm}`;
        }

        async function refreshUsageCount() {
            if (!currentSession || !currentSession.access_token) return;
            try {
                const resp = await fetch('/api/usage/monthly', {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + currentSession.access_token }
                });
                if (!resp.ok) return;
                const data = await resp.json();
                const list = Array.isArray(data.items) ? data.items : [];
                const monthKey = getMonthKey(new Date());
                const current = list.find(x => x && x.month === monthKey);
                const countEl = document.getElementById('usage-month-count');
                if (countEl) countEl.textContent = String(current ? (current.count || 0) : 0);
                const badge = document.getElementById('usage-badge');
                if (badge) badge.style.display = 'inline-block';
            } catch (_) {}
        }

        async function initAuth() {
            try {
                const cfgResp = await fetch('/api/config');
                if (cfgResp.ok) {
                    const cfg = await cfgResp.json();
                    if (cfg.supabaseUrl && cfg.supabaseAnonKey && window.supabase) {
                        supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
                    }
                }
            } catch (_) {}

            if (!supabase) {
                window.location.replace('login.html');
                return;
            }
            const { data } = await supabase.auth.getSession();
            currentSession = data ? data.session : null;
            if (!currentSession) {
                window.location.replace('login.html');
                return;
            }
            const email = currentSession.user ? currentSession.user.email : '';
            const statusEl = document.getElementById('auth-status');
            if (statusEl) statusEl.textContent = 'ログイン中: ' + email;
            await refreshUsageCount();

            supabase.auth.onAuthStateChange(async (_event, session) => {
                currentSession = session;
                if (!session) {
                    window.location.replace('login.html');
                    return;
                }
                const em = session.user ? session.user.email : '';
                if (statusEl) statusEl.textContent = 'ログイン中: ' + em;
                await refreshUsageCount();
            });
        }

        async function doLogout() {
            if (!supabase) return;
            await supabase.auth.signOut();
            window.location.replace('login.html');
        }

        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');

        const mapCanvas = document.getElementById('map-canvas');
        const mapCtx = mapCanvas.getContext('2d');
        let mapShapes = [];
        let mapBackgroundImage = null;
        let mapOffsetX = 0, mapOffsetY = 0;
        let mapPanning = false, mapPanStartX = 0, mapPanStartY = 0, mapPanStartOffsetX = 0, mapPanStartOffsetY = 0;
        let lastMapCenter = '', lastMapZoom = 18;
        let lastMapCenterLatLng = null;  // 住所表示時もパン後の再取得用に現在の中心座標を保持
        let mapDrawing = false, mapStartX = 0, mapStartY = 0;
        let mapHatchPoints = [];
        let mapDraggingShapeIndex = -1, mapDragStartX = 0, mapDragStartY = 0;
        let mapPendingTextPos = null;
        let activeCanvas = 'main'; // 'main' | 'map'
        
        let currentTool = 'rect', currentColor = '#000000', drawing = false;
        let startX, startY, shapes = [], isShiftDown = false;
        let hatchPoints = []; 
        let lastMouseX = 0, lastMouseY = 0; 
        let tempMultiRect = null;
        let tempMultiRectForMap = false; 
        let draggingShapeIndex = -1, dragStartX = 0, dragStartY = 0;

        // 共通の操作履歴（左・右どちらの描写かだけを記録）
        let history = []; // { target: 'main' | 'map' }

        const FONT_SIZE_L = "bold 32px sans-serif";
        const FONT_SIZE_S = "bold 20px sans-serif"; 
        const LINE_WIDTH = 3; 

        window.addEventListener('keydown', (e) => { if(e.key === 'Shift') { isShiftDown = true; redraw(); redrawMap(); } });
        window.addEventListener('keyup', (e) => { if(e.key === 'Shift') { isShiftDown = false; redraw(); redrawMap(); } });

        function updateCanvasScale() {
            // レイアウトの倍率は CSS の .canvas-scale-wrap のみで管理する
            return;
        }

        function getPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            let x = rect.width > 0 ? (clientX - rect.left) / rect.width * canvas.width : 0;
            let y = rect.height > 0 ? (clientY - rect.top) / rect.height * canvas.height : 0;
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            x = Math.round(x / 10) * 10;
            y = Math.round(y / 10) * 10;
            if (Math.abs(x - canvas.width) < 10) x = canvas.width;
            if (Math.abs(y - canvas.height) < 10) y = canvas.height;
            return { x, y };
        }

        function getMapPos(clientX, clientY) {
            const rect = mapCanvas.getBoundingClientRect();
            let x = rect.width > 0 ? (clientX - rect.left) / rect.width * mapCanvas.width : 0;
            let y = rect.height > 0 ? (clientY - rect.top) / rect.height * mapCanvas.height : 0;
            x = Math.max(0, Math.min(mapCanvas.width, x));
            y = Math.max(0, Math.min(mapCanvas.height, y));
            x = Math.round(x / 10) * 10;
            y = Math.round(y / 10) * 10;
            if (Math.abs(x - mapCanvas.width) < 10) x = mapCanvas.width;
            if (Math.abs(y - mapCanvas.height) < 10) y = mapCanvas.height;
            return { x, y };
        }

        function loadMapImage() {
            const input = document.getElementById('map-address').value.trim();
            if (!input) {
                alert('住所または座標を入力してください。');
                return;
            }
            const center = input;
            const zoom = lastMapZoom;
            const coordMatch = input.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
            // 座標で入力された場合はここで中心座標を保持
            lastMapCenterLatLng = coordMatch ? { lat: parseFloat(coordMatch[1]), lng: parseFloat(coordMatch[2]) } : null;

            const url = '/api/staticmap?center=' + encodeURIComponent(center) + '&zoom=' + zoom;
            fetch(url)
                .then(function(response) {
                    if (!response.ok) {
                        return response.text().then(function(text) {
                            throw new Error('HTTP ' + response.status + ': ' + (text || response.statusText));
                        });
                    }
                    // サーバーが返した中心座標（座標または住所→座標）を取得
                    const xMapCenter = response.headers.get('X-Map-Center');
                    return response.blob().then(function(blob) {
                        return { blob: blob, xMapCenter: xMapCenter };
                    });
                })
                .then(function(data) {
                    const blob = data.blob;
                    const xMapCenter = data.xMapCenter;
                    if (xMapCenter) {
                        const parts = xMapCenter.split(',');
                        if (parts.length >= 2) {
                            lastMapCenterLatLng = {
                                lat: parseFloat(parts[0]),
                                lng: parseFloat(parts[1])
                            };
                        }
                    }
                    const objectUrl = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = function() {
                        URL.revokeObjectURL(objectUrl);
                        mapBackgroundImage = img;
                        lastMapCenter = center;
                        lastMapZoom = zoom;
                        mapOffsetX = 0;
                        mapOffsetY = 0;
                        redrawMap();
                    };
                    img.onerror = function() {
                        URL.revokeObjectURL(objectUrl);
                        alert('地図画像の解釈に失敗しました。');
                    };
                    img.src = objectUrl;
                })
                .catch(function(err) {
                    var msg = '地図の読み込みに失敗しました。\n\n' + err.message;
                    if (err.message.indexOf('403') >= 0) {
                        msg += '\n\n【403の主な原因】\n・サーバー側のAPIキー制限またはMaps Static APIが有効になっていない可能性があります。';
                    } else if (err.message.indexOf('400') >= 0) {
                        msg += '\n\n【400の主な原因】\n・住所・座標の形式が不正（座標は「緯度,経度」で入力）';
                    } else if (err.message.indexOf('500') >= 0) {
                        msg += '\n\n【500】\n・サーバーでAPIキーが設定されていない可能性があります。';
                    }
                    alert(msg);
                });
        }

        function mapZoomChange(delta) {
            if (!mapBackgroundImage) {
                alert('先に「地図を表示」で地図を読み込んでください。');
                return;
            }
            lastMapZoom = Math.max(14, Math.min(20, lastMapZoom + delta));
            document.getElementById('map-address').value = lastMapCenter;
            loadMapImage();
        }

        // ピクセルオフセットから緯度経度の変化量を算出（ズームレベルと緯度に依存）
        function pixelOffsetToLatLngDelta(dx, dy, zoom, centerLat) {
            const scale = 256 * Math.pow(2, zoom);
            const dlat = (dy * 180) / scale;  // 下方向ドラッグ = 中心が北へ
            const dlng = (-dx * 360 * Math.cos(centerLat * Math.PI / 180)) / scale;  // 右方向ドラッグ = 中心が西へ
            return { dlat, dlng };
        }

        // 地図パン終了時：中心座標から新しい中心を算出して再取得（住所でも座標でも共通）
        function reloadMapAfterPan() {
            if (!mapBackgroundImage || !lastMapCenter) return;
            if (!lastMapCenterLatLng) {
                // 万一中心座標がない場合は元の位置で描き直す
                mapOffsetX = 0;
                mapOffsetY = 0;
                loadMapImage();
                return;
            }
            const lat = lastMapCenterLatLng.lat;
            const lng = lastMapCenterLatLng.lng;
            const { dlat, dlng } = pixelOffsetToLatLngDelta(mapOffsetX, mapOffsetY, lastMapZoom, lat);
            const newLat = Math.max(-85, Math.min(85, lat + dlat));
            const newLng = ((lng + dlng) + 180) % 360 - 180;
            const newCenter = newLat + ',' + newLng;
            lastMapCenterLatLng = { lat: newLat, lng: newLng };
            document.getElementById('map-address').value = newCenter;
            lastMapCenter = newCenter;
            mapOffsetX = 0;
            mapOffsetY = 0;
            loadMapImage();
        }

        function handleGlobalMouseMove(e) {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (drawing || hatchPoints.length > 0) redraw();
            if (draggingShapeIndex >= 0) {
                const p = getPos(lastMouseX, lastMouseY);
                const dx = p.x - dragStartX, dy = p.y - dragStartY;
                applyDragMove(draggingShapeIndex, dx, dy);
                dragStartX = p.x; dragStartY = p.y;
                redraw();
            }
            if (mapDrawing || mapHatchPoints.length > 0) redrawMap();
            if (mapDraggingShapeIndex >= 0) {
                const p = getMapPos(lastMouseX, lastMouseY);
                const dx = p.x - mapDragStartX, dy = p.y - mapDragStartY;
                applyMapDragMove(mapDraggingShapeIndex, dx, dy);
                mapDragStartX = p.x; mapDragStartY = p.y;
                redrawMap();
            }
            if (mapPanning) {
                mapOffsetX = mapPanStartOffsetX + (e.clientX - mapPanStartX);
                mapOffsetY = mapPanStartOffsetY + (e.clientY - mapPanStartY);
                redrawMap();
            }
        }

        let pendingTextPos = null;

        function handleGlobalMouseDown(e) {
            if (e.target.closest('.toolbar') || e.target.closest('.title-row') || e.target.closest('.map-address-row') || e.target.closest('#multi-modal') || e.target.closest('#text-modal')) return;
            if (e.target !== canvas && e.target !== mapCanvas) return;

            const isMap = (e.target === mapCanvas);
            const p = isMap ? getMapPos(e.clientX, e.clientY) : getPos(e.clientX, e.clientY);

            if (isMap) {
                if (currentTool === 'mappan') {
                    mapPanning = true;
                    mapPanStartX = e.clientX;
                    mapPanStartY = e.clientY;
                    mapPanStartOffsetX = mapOffsetX;
                    mapPanStartOffsetY = mapOffsetY;
                    return;
                }
                if (currentTool === 'delete') {
                    const idx = getMapShapeIndexAt(p.x, p.y);
                    if (idx >= 0) {
                        mapShapes.splice(idx, 1);
                        redrawMap();
                    }
                    return;
                }
                if (currentTool === 'select') {
                    const idx = getMapShapeIndexAt(p.x, p.y);
                    if (idx >= 0) {
                        mapDraggingShapeIndex = idx;
                        mapDragStartX = p.x; mapDragStartY = p.y;
                    }
                    return;
                }
                if (currentTool === 'hatch') {
                    mapHatchPoints.push(p);
                    if (mapHatchPoints.length > 2) {
                        const first = mapHatchPoints[0];
                        if (Math.hypot(p.x - first.x, p.y - first.y) < 15 && mapHatchPoints.length > 3) {
                            finishMapHatch();
                        }
                    }
                    redrawMap();
                    return;
                }
                mapStartX = p.x; mapStartY = p.y; mapDrawing = true;
                if (currentTool === 'text') {
                    const textArea = document.getElementById('text-input-area');
                    document.getElementById('text-modal-overlay').style.display = 'block';
                    document.getElementById('text-modal').style.display = 'block';
                    if (textArea) {
                        textArea.value = '';
                        // レイアウト反映後にフォーカスを当てないとブラウザによっては無視されるため、少し遅延させる
                        setTimeout(() => { textArea.focus(); textArea.select(); }, 0);
                    }
                    mapPendingTextPos = { x: p.x, y: p.y };
                    mapDrawing = false;
                }
                return;
            }

            if (currentTool === 'delete') {
                const idx = getShapeIndexAt(p.x, p.y);
                if (idx >= 0) {
                    shapes.splice(idx, 1);
                    redraw();
                }
                return;
            }

            if (currentTool === 'select') {
                const idx = getShapeIndexAt(p.x, p.y);
                if (idx >= 0) {
                    draggingShapeIndex = idx;
                    dragStartX = p.x; dragStartY = p.y;
                }
                return;
            }

            if (currentTool === 'hatch') {
                hatchPoints.push(p);
                if (hatchPoints.length > 2) {
                    const first = hatchPoints[0];
                    if (Math.hypot(p.x - first.x, p.y - first.y) < 15 && hatchPoints.length > 3) {
                        finishHatch();
                    }
                }
                redraw();
                return;
            }

            startX = p.x; startY = p.y; drawing = true;

            if (currentTool === 'text') {
                const textArea = document.getElementById('text-input-area');
                document.getElementById('text-modal-overlay').style.display = 'block';
                document.getElementById('text-modal').style.display = 'block';
                if (textArea) {
                    textArea.value = '';
                    setTimeout(() => { textArea.focus(); textArea.select(); }, 0);
                }
                pendingTextPos = { x: startX, y: startY };
                drawing = false;
            }
        }

        function handleGlobalMouseUp(e) {
            if (mapPanning) {
                mapPanning = false;
                reloadMapAfterPan();
                return;
            }
            if (currentTool === 'select' && draggingShapeIndex >= 0) {
                draggingShapeIndex = -1;
                return;
            }
            if (currentTool === 'select' && mapDraggingShapeIndex >= 0) {
                mapDraggingShapeIndex = -1;
                return;
            }
            if (mapDrawing && currentTool !== 'hatch') {
                const p = getMapPos(e.clientX, e.clientY);
                let endX = p.x, endY = p.y;
                mapDrawing = false;
                if (currentTool === 'multi') {
                    tempMultiRect = { x1: mapStartX, y1: mapStartY, x2: endX, y2: endY, color: currentColor };
                    document.getElementById('modal-overlay').style.display = 'block';
                    document.getElementById('multi-modal').style.display = 'block';
                    const mc = document.getElementById('multi-count');
                    if (mc) { mc.focus(); mc.select(); }
                    tempMultiRectForMap = true;
                } else if (currentTool === 'dist') {
                    const d = prompt("距離を入力:");
                    if (d) {
                        mapShapes.push({ type: 'dist', x1: mapStartX, y1: mapStartY, x2: endX, y2: endY, text: d + "m", color: '#ff0000' });
                        history.push({ target: 'map' });
                    }
                } else {
                    if (isShiftDown && currentTool !== 'rect') {
                        if (Math.abs(endX - mapStartX) > Math.abs(endY - mapStartY)) endY = mapStartY; else endX = mapStartX;
                    }
                    mapShapes.push({ type: currentTool, x1: mapStartX, y1: mapStartY, x2: endX, y2: endY, color: currentColor });
                    history.push({ target: 'map' });
                }
                redrawMap();
                return;
            }
            if (!drawing || currentTool === 'hatch') return;
            
            const p = getPos(e.clientX, e.clientY);
            let endX = p.x, endY = p.y;
            drawing = false;

            if (currentTool === 'multi') {
                tempMultiRect = {x1:startX, y1:startY, x2:endX, y2:endY, color:currentColor};
                document.getElementById('modal-overlay').style.display = 'block';
                document.getElementById('multi-modal').style.display = 'block';
                const mc = document.getElementById('multi-count');
                if (mc) { mc.focus(); mc.select(); }
                tempMultiRectForMap = false;
            } else if (currentTool === 'dist') {
                const d = prompt("距離を入力:");
                if (d) {
                    shapes.push({type:'dist', x1:startX, y1:startY, x2:endX, y2:endY, text:d+"m", color:'#ff0000'});
                    history.push({ target: 'main' });
                }
            } else {
                if (isShiftDown && currentTool !== 'rect') {
                    if (Math.abs(endX - startX) > Math.abs(endY - startY)) endY = startY; else endX = startX;
                }
                shapes.push({type:currentTool, x1:startX, y1:startY, x2:endX, y2:endY, color:currentColor});
                history.push({ target: 'main' });
            }
            redraw();
        }

        // 点から線分までの距離
        function distToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const len = Math.hypot(dx, dy);
            if (len === 0) return Math.hypot(px - x1, py - y1);
            const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (len * len)));
            const qx = x1 + t * dx, qy = y1 + t * dy;
            return Math.hypot(px - qx, py - qy);
        }
        // 多角形内に点があるか（ray casting）
        function pointInPolygon(x, y, points) {
            let inside = false;
            const n = points.length;
            for (let i = 0, j = n - 1; i < n; j = i++) {
                const xi = points[i].x, yi = points[i].y, xj = points[j].x, yj = points[j].y;
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
            }
            return inside;
        }
        // クリック位置にある図形のインデックス（上にあるほど優先）。なければ -1
        function getShapeIndexAt(x, y) {
            const hitMargin = 8;
            for (let i = shapes.length - 1; i >= 0; i--) {
                const s = shapes[i];
                if (s.type === 'rect') {
                    const xMin = Math.min(s.x1, s.x2) - hitMargin, xMax = Math.max(s.x1, s.x2) + hitMargin;
                    const yMin = Math.min(s.y1, s.y2) - hitMargin, yMax = Math.max(s.y1, s.y2) + hitMargin;
                    if (x >= xMin && x <= xMax && y >= yMin && y <= yMax) return i;
                } else if (s.type === 'line' || s.type === 'dist') {
                    if (distToSegment(x, y, s.x1, s.y1, s.x2, s.y2) <= hitMargin) return i;
                } else if (s.type === 'multi') {
                    const xMin = Math.min(s.x1, s.x2) - hitMargin, xMax = Math.max(s.x1, s.x2) + hitMargin;
                    const yMin = Math.min(s.y1, s.y2) - hitMargin, yMax = Math.max(s.y1, s.y2) + hitMargin;
                    if (x >= xMin && x <= xMax && y >= yMin && y <= yMax) return i;
                } else if (s.type === 'hatch' && s.points && s.points.length >= 3) {
                    if (pointInPolygon(x, y, s.points)) return i;
                } else if (s.type === 'text') {
                    const fontSize = s.fontSize != null ? s.fontSize : 32;
                    const lineRatio = s.lineHeight != null ? s.lineHeight : 1.25;
                    const lineHeight = fontSize * lineRatio;
                    const lines = (s.lines && s.lines.length > 0) ? s.lines : (s.text != null ? [s.text] : []);
                    if (lines.length === 0) continue;
                    ctx.save();
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    let maxW = 0;
                    lines.forEach(l => { maxW = Math.max(maxW, ctx.measureText(l).width); });
                    ctx.restore();
                    const top = s.y;
                    const bottom = s.y + (lines.length - 1) * lineHeight + fontSize;
                    if (x >= s.x && x <= s.x + maxW && y >= top && y <= bottom) return i;
                }
            }
            return -1;
        }

        function applyDragMove(idx, dx, dy) {
            const s = shapes[idx];
            if (!s) return;
            if (s.type === 'rect' || s.type === 'line' || s.type === 'multi' || s.type === 'dist') {
                s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy;
            } else if (s.type === 'hatch' && s.points) {
                s.points.forEach(pt => { pt.x += dx; pt.y += dy; });
            } else if (s.type === 'text') {
                s.x += dx; s.y += dy;
            }
        }

        function getMapShapeIndexAt(x, y) {
            const hitMargin = 8;
            for (let i = mapShapes.length - 1; i >= 0; i--) {
                const s = mapShapes[i];
                if (s.type === 'rect') {
                    const xMin = Math.min(s.x1, s.x2) - hitMargin, xMax = Math.max(s.x1, s.x2) + hitMargin;
                    const yMin = Math.min(s.y1, s.y2) - hitMargin, yMax = Math.max(s.y1, s.y2) + hitMargin;
                    if (x >= xMin && x <= xMax && y >= yMin && y <= yMax) return i;
                } else if (s.type === 'line' || s.type === 'dist') {
                    if (distToSegment(x, y, s.x1, s.y1, s.x2, s.y2) <= hitMargin) return i;
                } else if (s.type === 'multi') {
                    const xMin = Math.min(s.x1, s.x2) - hitMargin, xMax = Math.max(s.x1, s.x2) + hitMargin;
                    const yMin = Math.min(s.y1, s.y2) - hitMargin, yMax = Math.max(s.y1, s.y2) + hitMargin;
                    if (x >= xMin && x <= xMax && y >= yMin && y <= yMax) return i;
                } else if (s.type === 'hatch' && s.points && s.points.length >= 3) {
                    if (pointInPolygon(x, y, s.points)) return i;
                } else if (s.type === 'text') {
                    const fontSize = s.fontSize != null ? s.fontSize : 32;
                    const lineRatio = s.lineHeight != null ? s.lineHeight : 1.25;
                    const lineHeight = fontSize * lineRatio;
                    const lines = (s.lines && s.lines.length > 0) ? s.lines : (s.text != null ? [s.text] : []);
                    if (lines.length === 0) continue;
                    mapCtx.save();
                    mapCtx.font = 'bold ' + fontSize + 'px sans-serif';
                    let maxW = 0;
                    lines.forEach(l => { maxW = Math.max(maxW, mapCtx.measureText(l).width); });
                    mapCtx.restore();
                    const top = s.y;
                    const bottom = s.y + (lines.length - 1) * lineHeight + fontSize;
                    if (x >= s.x && x <= s.x + maxW && y >= top && y <= bottom) return i;
                }
            }
            return -1;
        }

        function applyMapDragMove(idx, dx, dy) {
            const s = mapShapes[idx];
            if (!s) return;
            if (s.type === 'rect' || s.type === 'line' || s.type === 'multi' || s.type === 'dist') {
                s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy;
            } else if (s.type === 'hatch' && s.points) {
                s.points.forEach(pt => { pt.x += dx; pt.y += dy; });
            } else if (s.type === 'text') {
                s.x += dx; s.y += dy;
            }
        }

        window.addEventListener('dblclick', (e) => {
            if (e.target.closest('.toolbar') || e.target.closest('.title-row') || e.target.closest('#multi-modal') || e.target.closest('#text-modal')) return;
            if (currentTool === 'hatch' && e.target === mapCanvas && mapHatchPoints.length > 2) finishMapHatch();
            if (currentTool === 'hatch' && e.target === canvas && hatchPoints.length > 2) finishHatch();
        });

        function finishHatch() {
            shapes.push({type:'hatch', points: [...hatchPoints], color: currentColor}); // color保存
            history.push({ target: 'main' });
            hatchPoints = [];
            redraw();
        }
        function finishMapHatch() {
            mapShapes.push({ type: 'hatch', points: [...mapHatchPoints], color: currentColor });
            history.push({ target: 'map' });
            mapHatchPoints = [];
            redrawMap();
        }

        // スナップ位置が分かるようにグリッドを描画
        function drawGrid() {
            const step = 10; // getPos と同じ 10px グリッド
            ctx.save();
            ctx.lineWidth = 1;

            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath();
                // 5マスごとに少し濃くする
                ctx.strokeStyle = (x % 50 === 0) ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.06)';
                ctx.moveTo(x + 0.5, 0);
                ctx.lineTo(x + 0.5, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath();
                ctx.strokeStyle = (y % 50 === 0) ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.06)';
                ctx.moveTo(0, y + 0.5);
                ctx.lineTo(canvas.width, y + 0.5);
                ctx.stroke();
            }

            ctx.restore();
        }

        // 実際の図形類を描画する共通関数（引数フラグでグリッド有無を制御）
        function redrawInternal(withGrid) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (withGrid) {
                drawGrid();
            }

            shapes.forEach(s => {
                ctx.strokeStyle = s.color; ctx.fillStyle = s.color; ctx.lineWidth = LINE_WIDTH;
                
                if(s.type==='rect') ctx.strokeRect(s.x1, s.y1, s.x2-s.x1, s.y2-s.y1);
                else if(s.type==='hatch') drawHatchPattern(ctx, s.points, s.color);
                else if(s.type==='multi'){
                    const dx = s.x2-s.x1, dy = s.y2-s.y1;
                    for(let i=0; i<s.count; i++){
                        const r = i/(s.count-1);
                        ctx.beginPath();
                        if(s.dir==='V') { let px = s.x1+(dx*r); ctx.moveTo(px,s.y1); ctx.lineTo(px,s.y2); }
                        else { let py = s.y1+(dy*r); ctx.moveTo(s.x1,py); ctx.lineTo(s.x2,py); }
                        ctx.stroke();
                    }
                } else if(s.type==='line' || s.type==='dist'){
                    ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
                    if(s.type==='dist'){
                        ctx.font = FONT_SIZE_S;
                        drawArrow(ctx, s.x1, s.y1, s.x2, s.y2); drawArrow(ctx, s.x2, s.y2, s.x1, s.y1);
                        const mx = (s.x1+s.x2)/2, my = (s.y1+s.y2)/2, tw = ctx.measureText(s.text).width;
                        ctx.fillStyle = "white"; ctx.fillRect(mx-tw/2-6, my-15, tw+12, 30);
                        ctx.fillStyle = s.color; ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(s.text, mx, my+9);
                    }
                } else if(s.type==='text'){
                    const fontSize = s.fontSize != null ? s.fontSize : 32;
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    const lineRatio = s.lineHeight != null ? s.lineHeight : 1.25;
                    const lineHeight = fontSize * lineRatio;
                    if (s.lines && s.lines.length > 0) {
                        s.lines.forEach((line, i) => { ctx.fillText(line, s.x, s.y + i * lineHeight); });
                    } else if (s.text != null) {
                        ctx.fillText(s.text, s.x, s.y);
                    }
                }

            });

            if (drawing) {
                const p = getPos(lastMouseX, lastMouseY);
                let curX = p.x, curY = p.y;
                if (isShiftDown && currentTool !== 'rect' && currentTool !== 'multi') {
                    if (Math.abs(curX - startX) > Math.abs(curY - startY)) curY = startY; else curX = startX;
                }

                ctx.strokeStyle = currentColor; // 現在の色を使用
                ctx.lineWidth = LINE_WIDTH;

                if (currentTool === 'rect') {
                    ctx.strokeRect(startX, startY, curX - startX, curY - startY);
                } else if (currentTool === 'multi') {
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(startX, startY, curX - startX, curY - startY);
                    ctx.setLineDash([]);
                } else if (currentTool === 'line' || currentTool === 'dist') {
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(curX, curY); ctx.stroke();
                    if (currentTool === 'dist') {
                        drawArrow(ctx, startX, startY, curX, curY);
                        drawArrow(ctx, curX, curY, startX, startY);
                    }
                }
            }

            if (hatchPoints.length > 0) {
                const p = getPos(lastMouseX, lastMouseY);
                ctx.beginPath(); ctx.strokeStyle = currentColor; ctx.lineWidth = 1;
                ctx.moveTo(hatchPoints[0].x, hatchPoints[0].y);
                hatchPoints.forEach(pt => ctx.lineTo(pt.x, pt.y));
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            }
        }

        // 通常の再描画（グリッド付き）
        function redraw() {
            redrawInternal(true);
        }

        function drawMapGrid() {
            const step = 10;
            mapCtx.save();
            mapCtx.lineWidth = 1;
            for (let x = 0; x <= mapCanvas.width; x += step) {
                mapCtx.beginPath();
                mapCtx.strokeStyle = (x % 50 === 0) ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.06)';
                mapCtx.moveTo(x + 0.5, 0);
                mapCtx.lineTo(x + 0.5, mapCanvas.height);
                mapCtx.stroke();
            }
            for (let y = 0; y <= mapCanvas.height; y += step) {
                mapCtx.beginPath();
                mapCtx.strokeStyle = (y % 50 === 0) ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.06)';
                mapCtx.moveTo(0, y + 0.5);
                mapCtx.lineTo(mapCanvas.width, y + 0.5);
                mapCtx.stroke();
            }
            mapCtx.restore();
        }

        function redrawMap() {
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            if (mapBackgroundImage) {
                mapCtx.drawImage(mapBackgroundImage, mapOffsetX, mapOffsetY, mapCanvas.width, mapCanvas.height);
            }
            drawMapGrid();
            mapShapes.forEach(s => drawOneShape(mapCtx, s, mapCanvas.width, mapCanvas.height));
            if (mapDrawing) {
                const p = getMapPos(lastMouseX, lastMouseY);
                let curX = p.x, curY = p.y;
                if (isShiftDown && currentTool !== 'rect' && currentTool !== 'multi') {
                    if (Math.abs(curX - mapStartX) > Math.abs(curY - mapStartY)) curY = mapStartY; else curX = mapStartX;
                }
                mapCtx.strokeStyle = currentColor;
                mapCtx.lineWidth = LINE_WIDTH;
                if (currentTool === 'rect') {
                    mapCtx.strokeRect(mapStartX, mapStartY, curX - mapStartX, curY - mapStartY);
                } else if (currentTool === 'multi') {
                    mapCtx.setLineDash([5, 5]);
                    mapCtx.strokeRect(mapStartX, mapStartY, curX - mapStartX, curY - mapStartY);
                    mapCtx.setLineDash([]);
                } else if (currentTool === 'line' || currentTool === 'dist') {
                    mapCtx.beginPath();
                    mapCtx.moveTo(mapStartX, mapStartY);
                    mapCtx.lineTo(curX, curY);
                    mapCtx.stroke();
                    if (currentTool === 'dist') {
                        drawArrow(mapCtx, mapStartX, mapStartY, curX, curY);
                        drawArrow(mapCtx, curX, curY, mapStartX, mapStartY);
                    }
                }
            }
            if (mapHatchPoints.length > 0) {
                const p = getMapPos(lastMouseX, lastMouseY);
                mapCtx.beginPath();
                mapCtx.strokeStyle = currentColor;
                mapCtx.lineWidth = 1;
                mapCtx.moveTo(mapHatchPoints[0].x, mapHatchPoints[0].y);
                mapHatchPoints.forEach(pt => mapCtx.lineTo(pt.x, pt.y));
                mapCtx.lineTo(p.x, p.y);
                mapCtx.stroke();
            }
        }

        function drawOneShape(context, s, cw, ch) {
            context.strokeStyle = s.color;
            context.fillStyle = s.color;
            context.lineWidth = LINE_WIDTH;
            if (s.type === 'rect') {
                context.strokeRect(s.x1, s.y1, s.x2 - s.x1, s.y2 - s.y1);
            } else if (s.type === 'hatch' && s.points && s.points.length >= 3) {
                drawHatchPattern(context, s.points, s.color);
            } else if (s.type === 'multi') {
                const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
                for (let i = 0; i < s.count; i++) {
                    const r = i / (s.count - 1);
                    context.beginPath();
                    if (s.dir === 'V') {
                        let px = s.x1 + (dx * r);
                        context.moveTo(px, s.y1);
                        context.lineTo(px, s.y2);
                    } else {
                        let py = s.y1 + (dy * r);
                        context.moveTo(s.x1, py);
                        context.lineTo(s.x2, py);
                    }
                    context.stroke();
                }
            } else if (s.type === 'line' || s.type === 'dist') {
                context.beginPath();
                context.moveTo(s.x1, s.y1);
                context.lineTo(s.x2, s.y2);
                context.stroke();
                if (s.type === 'dist') {
                    context.font = FONT_SIZE_S;
                    drawArrow(context, s.x1, s.y1, s.x2, s.y2);
                    drawArrow(context, s.x2, s.y2, s.x1, s.y1);
                    const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2, tw = context.measureText(s.text).width;
                    context.fillStyle = 'white';
                    context.fillRect(mx - tw / 2 - 6, my - 15, tw + 12, 30);
                    context.fillStyle = s.color;
                    context.textAlign = 'center';
                    context.textBaseline = 'alphabetic';
                    context.fillText(s.text, mx, my + 9);
                }
            } else if (s.type === 'text') {
                const fontSize = s.fontSize != null ? s.fontSize : 32;
                context.font = 'bold ' + fontSize + 'px sans-serif';
                context.textAlign = 'left';
                context.textBaseline = 'top';
                const lineRatio = s.lineHeight != null ? s.lineHeight : 1.25;
                const lineHeight = fontSize * lineRatio;
                if (s.lines && s.lines.length > 0) {
                    s.lines.forEach((line, i) => { context.fillText(line, s.x, s.y + i * lineHeight); });
                } else if (s.text != null) {
                    context.fillText(s.text, s.x, s.y);
                }
            }
        }

        function drawHatchPattern(context, points, color) {
            context.save();
            context.beginPath();
            context.moveTo(points[0].x, points[0].y);
            points.forEach(p => context.lineTo(p.x, p.y));
            context.closePath();
            context.clip();

            // ハッチング色（薄く）
            context.strokeStyle = color === '#ff0000' ? 'rgba(255, 0, 0, 0.4)' : 'rgba(0, 0, 0, 0.4)'; 
            context.lineWidth = 2;
            const max = Math.max(context.canvas.width, context.canvas.height);
            for (let i = -max; i < max * 2; i += 12) {
                context.beginPath();
                context.moveTo(i, 0);
                context.lineTo(i + max, max);
                context.stroke();
            }
            context.restore();
            // 外周を実線で囲む
            context.beginPath();
            context.moveTo(points[0].x, points[0].y);
            points.forEach(p => context.lineTo(p.x, p.y));
            context.closePath();
            context.strokeStyle = color;
            context.lineWidth = 1;
            context.setLineDash([]);
            context.stroke();
        }

        function drawArrow(c, x1, y1, x2, y2) {
            const a = Math.atan2(y2-y1, x2-x1), l = 18;
            c.beginPath(); c.moveTo(x2, y2);
            c.lineTo(x2-l*Math.cos(a-Math.PI/6), y2-l*Math.sin(a-Math.PI/6));
            c.moveTo(x2, y2);
            c.lineTo(x2-l*Math.cos(a+Math.PI/6), y2-l*Math.sin(a+Math.PI/6));
            c.stroke();
        }

        function setColor(c) { 
            currentColor = c; 
            document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', b.style.backgroundColor.rgb === c || (c==='#000000' && b.id==='col-black') || (c==='#ff0000' && b.id==='col-red'))); 
        }

        function setTool(t) {
            currentTool = t;
            hatchPoints = [];
            drawing = false;
            draggingShapeIndex = -1;

            // 色の自動切り替え
            if (t === 'hatch' || t === 'dist') {
                setColor('#ff0000');
            } else {
                setColor('#000000');
            }

            redraw();
            document.querySelectorAll('.toolbar button').forEach(b => b.classList.toggle('active', b.id === 'tool-'+t));
            var mappanBtn = document.getElementById('tool-mappan');
            if (mappanBtn) mappanBtn.classList.toggle('active', t === 'mappan');

            // 文字ツール選択時は、文字入力モーダルが開いていればそのテキストエリアにフォーカスを当てる
            if (t === 'text') {
                const textModal = document.getElementById('text-modal');
                const textArea = document.getElementById('text-input-area');
                if (textModal && textArea && textModal.style.display !== 'none') {
                    textArea.focus();
                    textArea.select();
                }
            }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('multi-modal').style.display = 'none'; }
        function confirmMulti(d) {
            const c = parseInt(document.getElementById('multi-count').value);
            if (c >= 2) {
                if (tempMultiRectForMap) {
                    mapShapes.push({ type: 'multi', ...tempMultiRect, count: c, dir: d });
                    history.push({ target: 'map' });
                    redrawMap();
                } else {
                    shapes.push({ type: 'multi', ...tempMultiRect, count: c, dir: d });
                    history.push({ target: 'main' });
                    redraw();
                }
            }
            closeModal();
        }

        function closeTextModal() {
            document.getElementById('text-modal-overlay').style.display = 'none';
            document.getElementById('text-modal').style.display = 'none';
            pendingTextPos = null;
            mapPendingTextPos = null;
        }
        function confirmText() {
            if (mapPendingTextPos) {
                const raw = document.getElementById('text-input-area').value;
                if (!raw.trim()) { closeTextModal(); return; }
                const lines = raw.split('\n').map(l => l);
                const fontSize = parseInt(document.getElementById('text-size').value, 10) || 32;
                const lineHeight = parseFloat(document.getElementById('text-line-height').value) || 1.25;
                mapShapes.push({ type: 'text', x: mapPendingTextPos.x, y: mapPendingTextPos.y, lines: lines, color: currentColor, fontSize: fontSize, lineHeight: lineHeight });
                history.push({ target: 'map' });
                mapPendingTextPos = null;
                closeTextModal();
                redrawMap();
                return;
            }
            if (!pendingTextPos) { closeTextModal(); return; }
            const raw = document.getElementById('text-input-area').value;
            if (!raw.trim()) { closeTextModal(); return; }
            const lines = raw.split('\n').map(l => l); // 空行もそのまま
            const fontSize = parseInt(document.getElementById('text-size').value, 10) || 32;
            const lineHeight = parseFloat(document.getElementById('text-line-height').value) || 1.25;
            shapes.push({ type: 'text', x: pendingTextPos.x, y: pendingTextPos.y, lines: lines, color: currentColor, fontSize: fontSize, lineHeight: lineHeight });
            history.push({ target: 'main' });
            closeTextModal();
            redraw();
        }
        document.getElementById('text-modal-overlay').addEventListener('click', closeTextModal);
        function undo() {
            // 履歴に基づいて、直近の1操作だけを取り消す（左・右どちらか片方）
            if (history.length === 0) return;
            const last = history.pop();
            if (last.target === 'main' && shapes.length > 0) {
                shapes.pop();
                hatchPoints = [];
                redraw();
            } else if (last.target === 'map' && mapShapes.length > 0) {
                mapShapes.pop();
                mapHatchPoints = [];
                redrawMap();
            }
        }
        function clearCanvas() {
            if(confirm("全消去しますか？")) {
                shapes = [];
                hatchPoints = [];
                mapShapes = [];
                mapHatchPoints = [];
                history = [];
                redraw();
                redrawMap();
            }
        }

        async function generateFinalPDF() {
            try {
                const nameInputEl = document.getElementById('user-name');
                const rawName = nameInputEl ? nameInputEl.value.trim() : '';
                if (!rawName) {
                    alert('氏名を入力してください。');
                    if (nameInputEl) {
                        nameInputEl.focus();
                    }
                    return;
                }

                const safeName = rawName.replace(/[\/\\:*?"<>|]/g, '_');
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}${mm}${dd}`;

                const bytes = await fetch(TEMPLATE_URL).then(res => res.arrayBuffer());
                // 左：地図描写領域の画像を生成（グリッドなし）
                const mapExCanvas = document.createElement('canvas');
                mapExCanvas.width = mapCanvas.width;
                mapExCanvas.height = mapCanvas.height;
                const mapExCtx = mapExCanvas.getContext('2d');
                mapExCtx.fillStyle = '#e8e8e8';
                mapExCtx.fillRect(0, 0, mapExCanvas.width, mapExCanvas.height);
                if (mapBackgroundImage) {
                    mapExCtx.drawImage(mapBackgroundImage, mapOffsetX, mapOffsetY, mapCanvas.width, mapCanvas.height);
                }
                mapShapes.forEach(s => drawOneShape(mapExCtx, s, mapExCanvas.width, mapExCanvas.height));

                // 右：従来の配置図の画像を生成（グリッドなし）
                const exCanvas = document.createElement('canvas');
                exCanvas.width = canvas.width;
                exCanvas.height = canvas.height;
                const exCtx = exCanvas.getContext('2d');

                // 一時キャンバスに図形のみを描画（グリッドなし）
                const prevCtx = { ctxRef: ctx };
                // メインキャンバスの内容を壊さないように、元の図形描画処理を exCtx 上で再現
                // ここでは shapes / hatchPoints / drawing / 現在ツールのプレビューは無視し、
                // 確定済みの shapes のみを出力する簡易版を使う。
                shapes.forEach(s => {
                    exCtx.strokeStyle = s.color; exCtx.fillStyle = s.color; exCtx.lineWidth = LINE_WIDTH;
                    
                    if(s.type==='rect') exCtx.strokeRect(s.x1, s.y1, s.x2-s.x1, s.y2-s.y1);
                    else if(s.type==='hatch') drawHatchPattern(exCtx, s.points, s.color);
                    else if(s.type==='multi'){
                        const dx = s.x2-s.x1, dy = s.y2-s.y1;
                        for(let i=0; i<s.count; i++){
                            const r = i/(s.count-1);
                            exCtx.beginPath();
                            if(s.dir==='V') { let px = s.x1+(dx*r); exCtx.moveTo(px,s.y1); exCtx.lineTo(px,s.y2); }
                            else { let py = s.y1+(dy*r); exCtx.moveTo(s.x1,py); exCtx.lineTo(s.x2,py); }
                            exCtx.stroke();
                        }
                    } else if(s.type==='line' || s.type==='dist'){
                        exCtx.beginPath(); exCtx.moveTo(s.x1, s.y1); exCtx.lineTo(s.x2, s.y2); exCtx.stroke();
                        if(s.type==='dist'){
                            exCtx.font = FONT_SIZE_S;
                            drawArrow(exCtx, s.x1, s.y1, s.x2, s.y2); drawArrow(exCtx, s.x2, s.y2, s.x1, s.y1);
                            const mx = (s.x1+s.x2)/2, my = (s.y1+s.y2)/2, tw = exCtx.measureText(s.text).width;
                            exCtx.fillStyle = "white"; exCtx.fillRect(mx-tw/2-6, my-15, tw+12, 30);
                            exCtx.fillStyle = s.color; exCtx.textAlign="center"; exCtx.textBaseline="alphabetic"; exCtx.fillText(s.text, mx, my+9);
                        }
                    } else if(s.type==='text'){
                        const fontSize = s.fontSize != null ? s.fontSize : 32;
                        exCtx.font = `bold ${fontSize}px sans-serif`;
                        exCtx.textAlign = 'left';
                        exCtx.textBaseline = 'top';
                        const lineRatio = s.lineHeight != null ? s.lineHeight : 1.25;
                        const lineHeight = fontSize * lineRatio;
                        if (s.lines && s.lines.length > 0) {
                            s.lines.forEach((line, i) => { exCtx.fillText(line, s.x, s.y + i * lineHeight); });
                        } else if (s.text != null) {
                            exCtx.fillText(s.text, s.x, s.y);
                        }
                    }

                });

                const img = await fetch(exCanvas.toDataURL()).then(res => res.arrayBuffer());
                const mapImg = await fetch(mapExCanvas.toDataURL('image/png')).then(res => res.arrayBuffer());
                const doc = await PDFDocument.load(bytes);
                const png = await doc.embedPng(img);
                const mapPng = await doc.embedPng(mapImg);
                const page = doc.getPage(0);
                const { width, height } = page.getSize();
                const rectW = width * 0.423;
                const rectH = height * 0.555;
                const rectY = height * 0.271;
                const mapScale = 0.98;
                const mapW = rectW * mapScale;
                const mapH = rectH * mapScale;
                const mapX = width * 0.077 + (rectW - mapW) / 2;
                const mapY = rectY + (rectH - mapH) / 2;
                page.drawImage(mapPng, { x: mapX, y: mapY, width: mapW, height: mapH });
                page.drawImage(png, { x: width * 0.500, y: rectY, width: rectW, height: rectH });
                const out = await doc.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([out], {type: 'application/pdf'}));
                link.download = `${dateStr}_${safeName}_保管場所所在図.pdf`;
                link.click();

                // PDF保存（ダウンロード）成功としてカウント
                if (currentSession && currentSession.access_token) {
                    fetch('/api/pdf-save/increment', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + currentSession.access_token
                        },
                        body: JSON.stringify({ month: getMonthKey(now) })
                    }).then(async (r) => {
                        if (!r.ok) return;
                        const data = await r.json();
                        const countEl = document.getElementById('usage-month-count');
                        if (countEl && data && data.month === getMonthKey(now)) {
                            countEl.textContent = String(data.count || 0);
                        }
                        await refreshUsageCount();
                    }).catch(() => {});
                }
            } catch (e) { alert(e); }
        }

        setTool('rect'); // 初期ツール
        initAuth();
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateCanvasScale);
        } else {
            updateCanvasScale();
        }
        window.addEventListener('resize', updateCanvasScale);
    </script>
